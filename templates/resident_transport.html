{% extends "layout.html" %}
{% block content %}
<h1>Transportation request</h1>

<form method="post" class="card">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

  <div class="grid tight-row">
    <div>
      <label>Shelter</label>
      <input value="{{ shelter }}" readonly class="w-shelter">
    </div>

    <div>
      <label>Needed date and time</label>
      <input name="needed_at" type="datetime-local" required class="w-dt">
    </div>
  </div>

  <label>Pickup location</label>
  <input name="pickup_location" required>

  <label>Destination</label>
  <input name="destination" required>

  <label>Reason optional</label>
  <select name="reason">
    <option value="">Select</option>
    <option>Medical</option>
    <option>Work</option>
    <option>Court</option>
    <option>Housing</option>
    <option>Other</option>
  </select>

  <label for="callback_phone">Call back phone optional</label>
  <input id="callback_phone" name="callback_phone" type="tel" inputmode="numeric" class="w-phone">

  <label>Notes optional</label>
  <textarea name="resident_notes" rows="3"></textarea>

  <button type="submit">Submit</button>
</form>

{% endblock %}
