{% extends "layout.html" %}
{% block content %}

<h1>Add Calendar Event</h1>

<form method="post" class="card" style="max-width: 620px; margin: 20px auto; padding: 16px;">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

  <label for="title">Title</label>
  <input id="title" name="title" required>

  <label for="event_date">Date</label>
  <input id="event_date" type="date" name="event_date" value="{{ event_date }}" required>

  <label for="start_time">Start time</label>
  <input id="start_time" type="time" name="start_time">

  <label for="end_time">End time</label>
  <input id="end_time" type="time" name="end_time">

  <label for="shelter">Shelter</label>
  <select id="shelter" name="shelter">
    <option value="">None</option>
    <option value="abba">Abba</option>
    <option value="haven">Haven</option>
    <option value="gratitude">Gratitude</option>
  </select>

  <label for="notes">Notes</label>
  <textarea id="notes" name="notes" rows="5"></textarea>

  <div style="margin-top: 16px; display: flex; gap: 10px;">
    <button type="submit">Save event</button>
    <a href="{{ url_for('calendar.calendar_view') }}" class="btn">Cancel</a>
  </div>
</form>

{% endblock %}
