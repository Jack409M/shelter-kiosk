{% extends "layout.html" %}
{% block content %}
<h1>Staff login</h1>

<form method="post" class="card">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

  <label for="shelter">Shelter</label>
  <select name="shelter" id="shelter" required>
    <option value="">Select…</option>
    {% for s in all_shelters %}
      {% set shelter_value = (s or "")|lower %}
      <option value="{{ shelter_value }}" {% if (request.form.get("shelter", "")|lower) == shelter_value %}selected{% endif %}>
        {{ s }}
      </option>
    {% endfor %}
  </select>

  <label for="username">Username</label>
  <input
    id="username"
    name="username"
    type="text"
    value="{{ request.form.get('username', '') }}"
    autocomplete="username"
    autofocus
    required
  >

  <label for="password">Password</label>
  <input
    id="password"
    name="password"
    type="password"
    autocomplete="current-password"
    required
  >

  <button type="submit">Login</button>
</form>

{% endblock %}
