{% extends "layout.html" %}
{% block content %}

<div class="landing-header">

  <div class="landing-logo">
    <img src="/static/logo.png">
  </div>

  <h1>Downtown Women's Center</h1>
  <p>Shelter Operations Portal</p>

</div>


<div class="portal-container">

  <a class="portal-card" href="{{ url_for('auth.staff_login') }}">
    <img src="/static/admin_building.jpg">
    <div class="portal-text">
      <h2>Staff Portal</h2>
      <p>Employees and administrators</p>
    </div>
  </a>

  <a class="portal-card" href="{{ url_for('resident_requests.resident_leave') }}">
    <img src="/static/shelter.jpg">
    <div class="portal-text">
      <h2>Resident Services</h2>
      <p>Leave requests and resident forms</p>
    </div>
  </a>

</div>



<style>

body{
  background:#f3f6fb;
}

/* HEADER */

.landing-header{
  text-align:center;
  padding:70px 20px 50px 20px;
  background:linear-gradient(135deg,#2b3c55,#4a6fa5);
  color:white;
  margin-bottom:40px;
}

.landing-logo img{
  width:120px;
  margin-bottom:15px;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.25));
}

.landing-header h1{
  margin:0;
  font-size:34px;
}

.landing-header p{
  margin-top:6px;
  font-size:16px;
  opacity:.9;
}


/* PORTAL CARDS */

.portal-container{
  max-width:950px;
  margin:auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
  padding:0 20px 60px 20px;
}

.portal-card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  text-decoration:none;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  transition:all .2s ease;
}

.portal-card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 40px rgba(0,0,0,.18);
}

.portal-card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.portal-text{
  padding:22px;
}

.portal-text h2{
  margin:0;
  color:#2b3c55;
}

.portal-text p{
  margin-top:6px;
  color:#6c7a8a;
  font-size:14px;
}


/* MOBILE */

@media(max-width:750px){

  .portal-container{
    grid-template-columns:1fr;
  }

  .landing-header{
    padding:60px 20px 40px 20px;
  }

}

</style>

{% endblock %}
