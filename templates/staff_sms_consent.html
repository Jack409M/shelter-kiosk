{% extends "layout.html" %}

{% block content %}
<h1>SMS Consent</h1>

<table>
  <thead>
    <tr>
      <th>Phone</th>
      <th>Status</th>
      <th>Updated</th>
    </tr>
  </thead>

  <tbody>
    {% for r in rows %}
    <tr>
      <td>{{ r["phone_number"] }}</td>
      <td>
        {% if r["consent_status"] == "opt_in" %}
          <span style="color:green;">Opted In</span>
        {% else %}
          <span style="color:red;">Opted Out</span>
        {% endif %}
      </td>
      <td>{{ r["updated_at"] }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
