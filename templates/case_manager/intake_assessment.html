{% extends "layout.html" %}

{% block content %}

<div class="page">

  <h1>Resident Intake and Assessment</h1>

  <div class="tabs">

    <button class="tab-button active" data-tab="intake">
      Intake
    </button>

    <button class="tab-button" data-tab="assessment">
      Assessment
    </button>

  </div>


  <!-- INTAKE TAB -->

  <div class="tab-panel active" id="tab-intake">

    <form method="post" action="{{ url_for('case_manager.create_resident') }}">

      <div class="card-grid">

        <div class="card">

          <h3>Basic Information</h3>

          <label>First Name</label>
          <input type="text" name="first_name" required>

          <label>Last Name</label>
          <input type="text" name="last_name" required>

          <label>Birth Year</label>
          <input type="number" name="birth_year">

          <label>Phone</label>
          <input type="text" name="phone">

          <label>Email</label>
          <input type="email" name="email">

        </div>


        <div class="card">

          <h3>Program Entry</h3>

          <label>Shelter</label>

          <select name="shelter">
            <option value="abba">Abba House</option>
            <option value="haven">Haven House</option>
            <option value="gratitude">Gratitude House</option>
          </select>

          <label>Date Entered</label>
          <input type="date" name="date_entered">

          <label>Place Staying Before Entry</label>

          <select name="prior_living">
            <option value="">Select</option>
            <option value="street">Street</option>
            <option value="shelter">Emergency Shelter</option>
            <option value="jail">Jail</option>
            <option value="hospital">Hospital</option>
            <option value="family">Family / Friends</option>
            <option value="treatment">Treatment Program</option>
            <option value="other">Other</option>
          </select>

          <label>City</label>
          <input type="text" name="city">

          <label>Last Zip Code</label>
          <input type="text" name="zipcode">

        </div>


        <div class="card">

          <h3>Demographics</h3>

          <label>Ethnicity</label>

          <select name="ethnicity">
            <option value="">Select</option>
            <option value="hispanic">Hispanic</option>
            <option value="not_hispanic">Not Hispanic</option>
          </select>

          <label>Race</label>

          <select name="race">
            <option value="">Select</option>
            <option value="white">White</option>
            <option value="black">Black</option>
            <option value="native">Native American</option>
            <option value="asian">Asian</option>
            <option value="pacific">Pacific Islander</option>
            <option value="other">Other</option>
          </select>

          <label>Gender</label>

          <select name="gender">
            <option value="female">Female</option>
            <option value="male">Male</option>
            <option value="nonbinary">Nonbinary</option>
            <option value="other">Other</option>
          </select>

          <label>Veteran</label>

          <select name="veteran">
            <option value="">Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>

          <label>Disability</label>

          <select name="disability">
            <option value="">Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>

        </div>


        <div class="card">

          <h3>Initial Snapshot</h3>

          <label>Sobriety Date</label>
          <input type="date" name="sobriety_date">

          <label>Drug of Choice</label>

          <select name="drug_of_choice">
            <option value="">Select</option>
            <option value="alcohol">Alcohol</option>
            <option value="meth">Meth</option>
            <option value="opioids">Opioids</option>
            <option value="cocaine">Cocaine</option>
            <option value="multiple">Multiple</option>
            <option value="other">Other</option>
          </select>

          <label>Income at Entry</label>
          <input type="number" name="income_entry">

          <label>Education at Entry</label>

          <select name="education_entry">
            <option value="">Select</option>
            <option value="no_hs">No High School</option>
            <option value="hs">High School</option>
            <option value="ged">GED</option>
            <option value="college">Some College</option>
            <option value="associate">Associate</option>
            <option value="bachelor">Bachelor</option>
          </select>

        </div>

      </div>

      <div class="form-actions">

        <button type="submit" class="btn btn-primary">
          Save and Open Resident Profile
        </button>

      </div>

    </form>

  </div>


  <!-- ASSESSMENT TAB -->

  <div class="tab-panel" id="tab-assessment">

    <div class="card-grid">

      <div class="card">

        <h3>Trauma and Vulnerability</h3>

        <label>ACE Score</label>
        <input type="number" name="ace_score">

        <label>Sexual Survivor</label>
        <select name="sexual_survivor">
          <option value="">Select</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>

        <label>Domestic Violence Survivor</label>
        <select name="dv_survivor">
          <option value="">Select</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>

        <label>Human Trafficking Survivor</label>
        <select name="trafficking_survivor">
          <option value="">Select</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>

      </div>


      <div class="card">

        <h3>Barriers to Stability</h3>

        <label>Entry Felony Conviction</label>
        <select name="entry_felony">
          <option value="">Select</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>

        <label>Parole or Probation</label>
        <select name="parole_probation">
          <option value="">Select</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>

        <label>Drug Court</label>
        <select name="drug_court">
          <option value="">Select</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>

        <label>Warrants or Fines Unpaid</label>
        <select name="warrants_unpaid">
          <option value="">Select</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>

      </div>

    </div>

  </div>

</div>

<script>

const buttons = document.querySelectorAll(".tab-button");
const panels = document.querySelectorAll(".tab-panel");

buttons.forEach(btn => {

  btn.addEventListener("click", () => {

    buttons.forEach(b => b.classList.remove("active"));
    panels.forEach(p => p.classList.remove("active"));

    btn.classList.add("active");

    const tab = btn.dataset.tab;
    document.getElementById("tab-" + tab).classList.add("active");

  });

});

</script>

{% endblock %}
