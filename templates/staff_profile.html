{% extends "layout.html" %}
{% block content %}

<h1>My Profile</h1>

<form method="POST">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

  <div style="max-width:700px; display:grid; gap:14px;">

    <div>
      <label for="first_name">First Name</label><br>
      <input
        id="first_name"
        name="first_name"
        type="text"
        value="{{ user.first_name or '' }}"
        required
        style="width:100%; padding:10px;"
      >
    </div>

    <div>
      <label for="last_name">Last Name</label><br>
      <input
        id="last_name"
        name="last_name"
        type="text"
        value="{{ user.last_name or '' }}"
        required
        style="width:100%; padding:10px;"
      >
    </div>

    <div>
      <label for="username">Username</label><br>
      <input
        id="username"
        type="text"
        value="{{ user.username or '' }}"
        disabled
        style="width:100%; padding:10px; background:#f3f4f6;"
      >
    </div>

    <div>
      <label for="role">Role</label><br>
      <input
        id="role"
        type="text"
        value="{{ user.role or '' }}"
        disabled
        style="width:100%; padding:10px; background:#f3f4f6;"
      >
    </div>

    <div>
      <label for="email">Email</label><br>
      <input
        id="email"
        name="email"
        type="email"
        value="{{ user.email or '' }}"
        style="width:100%; padding:10px;"
      >
    </div>

    <div>
      <label for="mobile_phone">Mobile Phone</label><br>
      <input
        id="mobile_phone"
        name="mobile_phone"
        type="text"
        value="{{ user.mobile_phone or '' }}"
        style="width:100%; padding:10px;"
      >
    </div>

    <div>
      <label for="password">New Password</label><br>
      <input
        id="password"
        name="password"
        type="password"
        value=""
        autocomplete="new-password"
        style="width:100%; padding:10px;"
      >
      <div style="font-size:12px; color:#6b7280; margin-top:6px;">
        Leave blank to keep your current password.
      </div>
    </div>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <button type="submit">Save Changes</button>
      <a href="{{ url_for('attendance.staff_attendance') }}" style="margin-left:10px;">Cancel</a>
    </div>

  </div>
</form>

{% endblock %}
