{% extends "layout.html" %}
{% block content %}

<h1>My Profile</h1>

<div style="max-width:720px;background:#f7fbff;border:1px solid #cfd9e3;border-radius:16px;padding:24px;">

<form method="post">

<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">

<div>
<label>First Name</label>
<input name="first_name" value="{{ user.first_name or '' }}" style="width:100%;">
</div>

<div>
<label>Last Name</label>
<input name="last_name" value="{{ user.last_name or '' }}" style="width:100%;">
</div>

<div>
<label>Email</label>
<input name="email" value="{{ user.email or '' }}" style="width:100%;">
</div>

<div>
<label>Mobile Phone</label>
<input name="mobile_phone" value="{{ user.mobile_phone or '' }}" style="width:100%;">
</div>

</div>

<div style="margin-top:20px;">
<label>Change Password</label>
<input type="password" name="password" placeholder="Leave blank to keep current password" style="width:100%;">
</div>

<div style="margin-top:20px;">
<strong>Username:</strong> {{ user.username }}<br>
<strong>Role:</strong> {{ user.role }}
</div>

<div style="margin-top:24px;">
<button type="submit">Save Profile</button>
<a href="{{ url_for('auth.staff_home') }}" style="margin-left:10px;">Cancel</a>
</div>

</form>

</div>

{% endblock %}
