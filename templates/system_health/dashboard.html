{% extends "layout.html" %}

{% block content %}

<div class="page-header">
  <h1 class="page-title">System Health</h1>
  <div class="page-subtitle">Read only operational status for the Shelter Kiosk app.</div>
</div>

<div class="card">
  <h2>Application Status</h2>

  <div class="form-grid">
    <div class="form-field">
      <div class="form-label">Database</div>
      <div>{{ db_status|title }}</div>
    </div>

    <div class="form-field">
      <div class="form-label">App Version</div>
      <div>{{ app_version }}</div>
    </div>

    <div class="form-field field-width-date">
      <div class="form-label">Current Server Time</div>
      <div>{{ current_time }}</div>
    </div>
  </div>
</div>

{% endblock %}
