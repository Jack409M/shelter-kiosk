{% set budget_score = budget_score_snapshot or {} %}

<div class="cmx-grid cmx-grid-2">

  <div class="cmx-card" style="{{ budget_score.card_style if budget_score.card_style else '' }}">
    <div class="cmx-side-card-head">
      <h3>Budget Performance</h3>
    </div>

    <div class="cmx-stack">
      <div class="cmx-row-block">
        <span>Score</span>
        <span style="{{ budget_score.value_style if budget_score.value_style else '' }}">
          {{ budget_score.average_score_display or '—' }}
        </span>
      </div>
      <div class="cmx-row-block">
        <span>Band</span>
        <span>{{ budget_score.band_label or '—' }}</span>
      </div>
      <div class="cmx-row-block">
        <span>Months Counted</span>
        <span>{{ budget_score.eligible_month_count or 0 }}</span>
      </div>
    </div>
  </div>
