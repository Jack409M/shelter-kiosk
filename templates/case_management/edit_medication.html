{% extends "layout.html" %}

{% block content %}
<h1>Edit Medication</h1>

<div class="card">
  <h2>{{ resident["first_name"] }} {{ resident["last_name"] }}</h2>
  <p>
    <a class="btn" href="{{ url_for('case_management.medications', resident_id=resident['id']) }}">
      Back to Medications
    </a>
    <a class="btn" href="{{ url_for('case_management.resident_case', resident_id=resident['id']) }}">
      Back to Case Management
    </a>
  </p>
</div>

<div class="card">
  <form method="post" action="{{ url_for('case_management.edit_medication', resident_id=resident['id'], medication_id=medication['id']) }}">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

    <label><strong>Medication Name</strong></label>
    <input type="text" name="medication_name" value="{{ medication['medication_name'] or '' }}" required>

    <label><strong>Dosage</strong></label>
    <input type="text" name="dosage" value="{{ medication['dosage'] or '' }}">

    <label><strong>Frequency</strong></label>
    <input type="text" name="frequency" value="{{ medication['frequency'] or '' }}">

    <label><strong>Purpose</strong></label>
    <input type="text" name="purpose" value="{{ medication['purpose'] or '' }}">

    <label><strong>Prescribed By</strong></label>
    <input type="text" name="prescribed_by" value="{{ medication['prescribed_by'] or '' }}">

    <label><strong>Started On</strong></label>
    <input type="date" name="started_on" value="{{ medication['started_on'] or '' }}">

    <label><strong>Ended On</strong></label>
    <input type="date" name="ended_on" value="{{ medication['ended_on'] or '' }}">

    <label><strong>Active</strong></label>
    <select name="is_active">
      <option value="yes" {% if medication['is_active'] %}selected{% endif %}>Yes</option>
      <option value="no" {% if not medication['is_active'] %}selected{% endif %}>No</option>
    </select>

    <label><strong>Notes</strong></label>
    <textarea name="notes" rows="4">{{ medication['notes'] or '' }}</textarea>

    <div style="margin-top:10px;">
      <button type="submit">Save Changes</button>
    </div>
  </form>
</div>
{% endblock %}
