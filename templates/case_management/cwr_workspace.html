{% extends "layout.html" %}

{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/resident_case_workspace.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/cwr_workspace.css') }}">
{% endblock %}

{% block content %}
{% set resident_id = resident["id"] %}
{% set active_panel = request.args.get("active_panel", "") %}

<div class="cmx-page cwr-page">
  <div class="cmx-shell">

    <div class="cwr-control-row">
      <a class="cwr-back-link" href="{{ url_for('case_management.resident_case', resident_id=resident_id) }}">Back to Original Workspace</a>
    </div>

    <section>

      <!-- MODULE LINKS LOCKED TO CWR -->

      <a href="{{ url_for('case_management.ua_log', resident_id=resident_id, return_to='cwr', active_panel='ua') }}">UA</a>

      <a href="{{ url_for('case_management.medications', resident_id=resident_id, return_to='cwr', active_panel='medications') }}">Medications</a>

      <a href="{{ url_for('case_management.family_intake', resident_id=resident_id, return_to='cwr', active_panel='family') }}">Family</a>

      <a href="{{ url_for('case_management.income_support', resident_id=resident_id, return_to='cwr', active_panel='income') }}">Income</a>

      <a href="{{ url_for('case_management.recovery_profile', resident_id=resident_id, return_to='cwr', active_panel='recovery') }}">Recovery</a>

      <a href="{{ url_for('case_management.budget_sessions', resident_id=resident_id, return_to='cwr', active_panel='budget') }}">Budget</a>

      <a href="{{ url_for('writeups.resident_writeups', resident_id=resident_id, return_to='cwr', active_panel='writeups') }}">Write Ups</a>

    </section>

  </div>
</div>

{% endblock %}
