{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

  <h2>{{ followup_type_label }}</h2>

  <div class="mb-3">
    <strong>Resident:</strong>
    {{ resident.first_name }} {{ resident.last_name }}
  </div>

  <form method="POST">

    <!-- Follow Up Date -->
    <div class="mb-3">
      <label class="form-label">Follow Up Date</label>
      <input type="date"
             name="followup_date"
             class="form-control"
             value="{{ form_data.followup_date }}">
    </div>

    <!-- Income -->
    <div class="mb-3">
      <label class="form-label">Monthly Income</label>
      <input type="text"
             name="income_at_followup"
             class="form-control"
             placeholder="Enter monthly income"
             value="{{ form_data.income_at_followup }}">
    </div>

    <!-- Sobriety -->
    <div class="mb-3">
      <label class="form-label">Sober</label>
      <select name="sober_at_followup" class="form-control">
        <option value="">-- Select --</option>
        <option value="yes" {% if form_data.sober_at_followup == "yes" %}selected{% endif %}>Yes</option>
        <option value="no" {% if form_data.sober_at_followup == "no" %}selected{% endif %}>No</option>
      </select>
    </div>

    <!-- Notes -->
    <div class="mb-3">
      <label class="form-label">Notes</label>
      <textarea name="notes"
                class="form-control"
                rows="4">{{ form_data.notes }}</textarea>
    </div>

    <!-- Buttons -->
    <div class="mt-4">
      <button type="submit" class="btn btn-primary">
        Save Follow Up
      </button>

      <a href="{{ url_for('case_management.resident_case', resident_id=resident.id) }}"
         class="btn btn-secondary">
        Back to Case
      </a>
    </div>

  </form>

</div>

{% endblock %}
