{% extends "layout.html" %}

{% block extra_head %}

{% endblock %}

{% block content %}
<div class="cmx-page">
  <div class="cmx-shell">
    <div class="cmx-card">
      <h1>Rent Payment Entry Moved</h1>
      <div class="cmx-section-subtitle">
        The old rent sheet entry screen has been retired.
      </div>
      <div class="cmx-button-row" style="margin-top:16px;">
        <a class="cmx-btn" href="{{ url_for('rent_tracking.payment_station') }}">Go to Payment Station</a>
        <a class="cmx-btn-muted" href="{{ url_for('rent_tracking.rent_roll') }}">Back to Rent Roll</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
