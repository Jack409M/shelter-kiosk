{% extends "layout.html" %}

{% block content %}
<div class="budget-edit-page">
  <section class="budget-card">
    <h1>{{ budget_row['budget_month_label'] }}</h1>

    <a class="app-btn-pill app-btn-pill-light" href="{{ url_for('case_management.budget_sessions', resident_id=resident['id']) }}">
      Back to Budget Months
    </a>
  </section>

  <form method="post">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

    {% for item in budget_line_items %}
      <div>
        <strong>{{ item.line_label }}</strong>

        <input type="number" step="0.01" name="projected_amount_{{ item.id }}" value="{{ item.projected_amount or '' }}">
        <input type="number" step="0.01" name="actual_amount_{{ item.id }}" value="{{ item.actual_amount or '' }}">
      </div>
    {% endfor %}

    <button class="app-btn-pill app-btn-pill-dark" type="submit">
      Save Budget
    </button>
  </form>
</div>
{% endblock %}
