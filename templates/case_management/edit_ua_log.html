{% extends "layout.html" %}

{% block content %}
<h1>Edit UA Entry</h1>

<a class="btn" href="{{ back_url }}">Back</a>

<form method="post">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <input type="hidden" name="return_to" value="{{ return_to }}">
  <input type="hidden" name="active_panel" value="{{ active_panel }}">

  <input type="date" name="ua_date" value="{{ ua_row['ua_date'] }}">
  <input type="text" name="result" value="{{ ua_row['result'] }}">
  <input type="text" name="substances_detected" value="{{ ua_row['substances_detected'] }}">
  <textarea name="notes">{{ ua_row['notes'] }}</textarea>

  <button type="submit">Save</button>
  <a class="btn" href="{{ done_url }}">Done</a>
</form>
{% endblock %}
