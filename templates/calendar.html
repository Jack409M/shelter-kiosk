{% extends "layout.html" %}
{% block content %}

<h1>Shared Calendar</h1>

<div class="card" style="padding: 16px; margin-bottom: 16px;">
  <div id="calendar-status" style="font-weight: 600;">Loading calendar...</div>
</div>

<style>
  #calendar-wrap {
    max-width: 1100px;
    margin: 0 auto 24px auto;
    background: #ffffff;
    border-radius: 10px;
    padding: 12px;
  }

  #calendar {
    background: #ffffff;
    min-height: 700px;
  }

  /* kill global table bleed from static/styles.css */
  #calendar table {
    width: 100% !important;
    border-collapse: collapse !important;
    table-layout: fixed !important;
    background: #ffffff !important;
  }

  #calendar th,
  #calendar td {
    width: auto !important;
    max-width: none !important;
    padding: 0 !important;
    vertical-align: top !important;
    background: #ffffff !important;
  }

  /* override global first column width rule */
  #calendar td:first-child,
  #calendar th:first-child {
    width: auto !important;
    max-width: none !important;
  }

  #calendar .fc-scrollgrid,
  #calendar .fc-scrollgrid td,
  #calendar .fc-scrollgrid th {
    border-color: #d7dfe7 !important;
  }

  #calendar .fc-col-header-cell {
    background: #4f8fbe !important;
  }

  #calendar .fc-col-header-cell-cushion {
    display: block !important;
    padding: 10px 4px !important;
    color: #ffffff !important;
    font-weight: 700 !important;
    text-decoration: none !important;
    text-align: center !important;
  }

  #calendar .fc-daygrid-day-frame {
    min-height: 110px !important;
    padding: 4px !important;
  }

  #calendar .fc-daygrid-day-top {
    display: flex !important;
    justify-content: flex-start !important;
    align-items: flex-start !important;
  }

  #calendar .fc-daygrid-day-number {
    color: #1f2d3d !important;
    font-weight: 700 !important;
    text-decoration: none !important;
    padding: 0 !important;
    margin: 0 !important;
    line-height: 1 !important;
  }

  #calendar .fc-day-today {
    background: #eef6ff !important;
  }

  #calendar .fc-day-today td,
  #calendar .fc-day-today th,
  #calendar .fc-day-today .fc-daygrid-day-frame {
    background: #eef6ff !important;
  }

  #calendar .fc-day-other {
    background: #f8fafc !important;
  }

  #calendar .fc-day-other .fc-daygrid-day-number {
    color: #9aa7b4 !important;
  }

  #calendar .fc-toolbar-title {
    color: #1f2d3d !important;
    font-weight: 700 !important;
  }

  #calendar .fc-button {
    background: #ffffff !important;
    border: 1px solid #2c3e50 !important;
    color: #2c3e50 !important;
    box-shadow: none !important;
    text-transform: lowercase !important;
  }

  #calendar .fc-button:hover,
  #calendar .fc-button:focus {
    background: #eef6ff !important;
    border-color: #2c3e50 !important;
    color: #2c3e50 !important;
  }

  #calendar .fc-button-active,
  #calendar .fc-button-primary:not(:disabled).fc-button-active {
    background: #eef6ff !important;
    border-color: #2c3e50 !important;
    color: #2c3e50 !important;
  }

  #calendar .fc-button:disabled {
    background: #f2f4f7 !important;
    border-color: #cbd5e1 !important;
    color: #6b7280 !important;
    opacity: 1 !important;
  }

  #calendar .fc-event {
    border: none !important;
    border-radius: 4px !important;
    padding: 2px 4px !important;
    font-size: 12px !important;
    font-weight: 600 !important;
    cursor: pointer !important;
  }

  #calendar .fc-event-title,
  #calendar .fc-event-time {
    color: #ffffff !important;
  }
</style>

<div id="calendar-wrap">
  <div id="calendar"></div>
</div>

<script src="{{ url_for('static', filename='vendor/fullcalendar/index.global.min.js') }}"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const statusEl = document.getElementById("calendar-status");
    const calendarEl = document.getElementById("calendar");

    try {
      if (!window.FullCalendar) {
        statusEl.textContent = "Calendar failed to load. Local FullCalendar file missing.";
        return;
      }

      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        height: "auto",
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: "dayGridMonth,timeGridWeek,timeGridDay"
        },
        events: {
          url: "{{ url_for('calendar.calendar_events') }}"
        },
        dateClick: function(info) {
          window.location.href =
            "{{ url_for('calendar.add_event') }}" +
            "?event_date=" +
            encodeURIComponent(info.dateStr);
        },
        eventClick: function(info) {
          const eventId = info.event.id;
          window.location.href =
            "{{ url_for('calendar.edit_event', event_id=0) }}".replace("0", eventId);
        }
      });

      calendar.render();
      statusEl.textContent = "Calendar loaded.";
    } catch (err) {
      console.error(err);
      statusEl.textContent = "Calendar failed to render. Check browser console.";
    }
  });
</script>

{% endblock %}
