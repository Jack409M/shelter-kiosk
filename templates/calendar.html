{% extends "layout.html" %}
{% block content %}

<h1>Shared Calendar</h1>

<div class="card" style="padding: 16px; margin-bottom: 16px;">
  <div id="calendar-status" style="font-weight: 600;">Loading calendar...</div>
</div>

<style>
  #calendar-wrap {
    max-width: 1100px;
    margin: 0 auto 24px auto;
    background: #ffffff;
    border-radius: 10px;
    padding: 12px;
  }

  #calendar {
    background: #ffffff;
    color: #000000;
    min-height: 700px;
  }

  #calendar .fc {
    color: #1f2d3d;
  }

  #calendar .fc-scrollgrid,
  #calendar .fc-scrollgrid table {
    border-color: #d7dfe7;
  }

  #calendar .fc-col-header-cell {
    background: #4f8fbe;
    border: 1px solid #d7dfe7;
  }

  #calendar .fc-col-header-cell-cushion {
    color: #ffffff;
    font-weight: 700;
    text-decoration: none;
    padding: 10px 4px;
  }

  #calendar .fc-daygrid-day {
    background: #ffffff;
  }

  #calendar .fc-daygrid-day-frame {
    min-height: 110px;
    position: relative;
    padding: 4px;
  }

  #calendar .fc-daygrid-day-top {
    display: flex;
    justify-content: flex-end;
    align-items: flex-start;
  }

  #calendar .fc-daygrid-day-number {
    color: #1f2d3d;
    font-weight: 700;
    text-decoration: none;
    padding: 2px 4px 0 0;
  }

  #calendar .fc-day-today {
    background: #eef6ff !important;
  }

  #calendar .fc-day-other {
    background: #f8fafc;
  }

  #calendar .fc-day-other .fc-daygrid-day-number {
    color: #9aa7b4;
  }

  #calendar .fc-toolbar-title {
    color: #1f2d3d;
    font-weight: 700;
  }

  #calendar .fc-button {
    background: #ffffff !important;
    border: 1px solid #2c3e50 !important;
    color: #2c3e50 !important;
    box-shadow: none !important;
    text-transform: lowercase;
  }

  #calendar .fc-button:hover,
  #calendar .fc-button:focus {
    background: #eaf2f8 !important;
    border-color: #2c3e50 !important;
    color: #2c3e50 !important;
  }

  #calendar .fc-button-active {
    background: #2c3e50 !important;
    border-color: #2c3e50 !important;
    color: #ffffff !important;
  }

  #calendar .fc-button:disabled {
    opacity: 0.6;
    background: #f2f4f7 !important;
    color: #6b7280 !important;
    border-color: #cbd5e1 !important;
  }

  #calendar .fc-event {
    border: none;
    border-radius: 4px;
    padding: 2px 4px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  #calendar .fc-event-title,
  #calendar .fc-event-time {
    color: #ffffff;
  }

  #calendar .fc-toolbar {
    margin-bottom: 1rem;
  }
</style>

<div id="calendar-wrap">
  <div id="calendar"></div>
</div>

<script src="{{ url_for('static', filename='vendor/fullcalendar/index.global.min.js') }}"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const statusEl = document.getElementById("calendar-status");
    const calendarEl = document.getElementById("calendar");

    try {
      if (!window.FullCalendar) {
        statusEl.textContent = "Calendar failed to load. Local FullCalendar file missing.";
        return;
      }

      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        height: "auto",
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: "dayGridMonth,timeGridWeek,timeGridDay"
        },
        events: {
          url: "{{ url_for('calendar.calendar_events') }}"
        },
        dateClick: function(info) {
          window.location.href =
            "{{ url_for('calendar.calendar_view') }}" +
            "?selected_date=" +
            encodeURIComponent(info.dateStr);
        },
        eventClick: function(info) {
          alert("Event editing is not built yet.");
        }
      });

      calendar.render();
      statusEl.textContent = "Calendar loaded.";
    } catch (err) {
      console.error(err);
      statusEl.textContent = "Calendar failed to render. Check browser console.";
    }
  });
</script>

{% endblock %}
