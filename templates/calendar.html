{% extends "layout.html" %}
{% block content %}

<h1>Shared Calendar</h1>

<div class="card" style="padding: 16px; margin-bottom: 16px;">
  <div id="calendar-status" style="font-weight: 600;">Loading calendar...</div>
</div>

<div
  id="calendar"
  style="
    max-width: 1100px;
    margin: 0 auto 24px auto;
    min-height: 700px;
    background: #ffffff;
    border-radius: 10px;
    padding: 12px;
  "
></div>

<script src="{{ url_for('static', filename='vendor/fullcalendar/index.global.min.js') }}"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const statusEl = document.getElementById("calendar-status");
    const calendarEl = document.getElementById("calendar");

    try {
      if (!window.FullCalendar) {
        statusEl.textContent = "Calendar failed to load. Local FullCalendar file missing.";
        return;
      }

      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        height: "auto",
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: "dayGridMonth,timeGridWeek,timeGridDay"
        },
        events: {
          url: "{{ url_for('calendar.calendar_events') }}"
        },
        dateClick: function(info) {
          window.location.href =
            "{{ url_for('calendar.calendar_view') }}" +
            "?selected_date=" +
            encodeURIComponent(info.dateStr);
        },
        eventDidMount: function() {
          statusEl.textContent = "Calendar loaded.";
        }
      });

      calendar.render();
      statusEl.textContent = "Calendar loaded.";
    } catch (err) {
      console.error(err);
      statusEl.textContent = "Calendar failed to render. Check browser console.";
    }
  });
</script>

{% endblock %}
