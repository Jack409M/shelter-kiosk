name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      FLASK_SECRET_KEY: test-secret-key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      COOKIE_SECURE: "0"
      CLOUDFLARE_ONLY: "0"
      ENABLE_DEBUG_ROUTES: "0"
      ENABLE_DANGEROUS_ADMIN_ROUTES: "0"
      TWILIO_ENABLED: "0"
      TWILIO_INBOUND_ENABLED: "0"
      TWILIO_STATUS_ENABLED: "0"
      PYTHONPATH: .

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dev dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Ruff
        run: |
          ruff check tests core/app_factory.py core/app_hooks.py core/runtime.py core/auth.py core/db.py core/request_security.py routes/auth.py routes/resident_requests.py

      - name: Pytest
        run: |
          pytest
