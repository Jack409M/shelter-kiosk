name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      FLASK_SECRET_KEY: test-secret-key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      COOKIE_SECURE: "0"
      CLOUDFLARE_ONLY: "0"
      ENABLE_DEBUG_ROUTES: "0"
      ENABLE_DANGEROUS_ADMIN_ROUTES: "0"
      TWILIO_ENABLED: "0"
      TWILIO_INBOUND_ENABLED: "0"
      TWILIO_STATUS_ENABLED: "0"
      PYTHONPATH: .

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dev dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Wait for Postgres
        env:
          PGPASSWORD: postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Create log directory
        run: mkdir -p test-logs

      - name: Ruff
        run: |
          ruff check tests core/app_factory.py core/app_hooks.py core/runtime.py core/auth.py core/db.py core/request_security.py routes/auth.py routes/resident_requests.py | tee test-logs/ruff.log

      - name: MyPy
        run: |
          mypy --ignore-missing-imports --explicit-package-bases core/app_factory.py core/app_hooks.py core/runtime.py core/auth.py core/db.py core/request_security.py routes/auth.py routes/resident_requests.py | tee test-logs/mypy.log

      - name: Pytest resident requests
        run: |
          coverage run --parallel-mode -m pytest tests/test_resident_requests.py tests/test_resident_requests_more.py -q -x 2>&1 | tee test-logs/pytest_resident_requests.log

      - name: Pytest residents core
        run: |
          coverage run --parallel-mode -m pytest tests/test_core_residents.py tests/test_residents_basic.py -q -x 2>&1 | tee test-logs/pytest_residents_core.log

      - name: Pytest request security
        run: |
          coverage run --parallel-mode -m pytest tests/test_request_security.py tests/test_rate_limit_basic.py -q -x 2>&1 | tee test-logs/pytest_request_security.log

      - name: Pytest auth
        run: |
          coverage run --parallel-mode -m pytest tests/test_auth_login.py tests/test_auth_additional.py -q -x 2>&1 | tee test-logs/pytest_auth.log

      - name: Coverage report
        run: |
          coverage combine
          coverage report --fail-under=35 2>&1 | tee test-logs/coverage.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-logs
          path: test-logs/
