name: Autofix Lint

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements-dev.txt

      - name: Run Ruff fixes (safe + unsafe)
        run: |
          ruff check core db routes tests --fix --unsafe-fixes
          ruff format .

      - name: Check if files changed
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: autofix-ruff
          title: "chore: auto-fix lint issues"
          commit-message: "chore: auto-fix lint issues"
          body: |
            Automated Ruff cleanup (safe + unsafe fixes).
