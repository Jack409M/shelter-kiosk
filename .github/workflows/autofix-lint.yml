name: Autofix Lint

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements-dev.txt

      - name: Run Ruff autofix (safe + unsafe)
        run: |
          ruff check core db routes tests --fix --unsafe-fixes
          ruff format .

      - name: Commit changes
        run: |
          git config user.name "autofix-bot"
          git config user.email "autofix@users.noreply.github.com"

          git add .
          git diff --cached --quiet || git commit -m "chore: auto-fix ruff issues"

      - name: Push branch
        run: |
          git push origin HEAD:autofix-ruff || true

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: autofix-ruff
          title: "chore: auto-fix lint issues"
          body: |
            Automated Ruff cleanup.

            Includes:
            - safe fixes
            - unsafe fixes

            Remaining issues (if any) require manual review.
