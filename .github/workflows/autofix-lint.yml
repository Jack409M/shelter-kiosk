name: Autofix Lint

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "--version"

      - name: Run Ruff autofix
        run: |
          ruff check core db routes tests --fix --unsafe-fixes
          ruff format .

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-fix lint issues"
          branch: "autofix-ruff"
          delete-branch: true
          title: "chore: auto-fix lint issues"
          body: |
            Automated Ruff cleanup.

            This workflow ran:
            - ruff check core db routes tests --fix --unsafe-fixes
            - ruff format .

            Remaining CI issues, if any, need manual cleanup.
          labels: |
            chore
            automated
