name: Autofix Lint

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autofix-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "--version"

      - name: Autofix Ruff issues
        shell: bash
        run: |
          set -euo pipefail
          ruff check core db routes tests --fix
          ruff format .

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-fix Ruff issues"
          branch: "chore/autofix-ruff"
          delete-branch: true
          title: "chore: auto-fix Ruff issues"
          body: |
            Automated Ruff cleanup PR.

            This workflow ran:
            - ruff check core db routes tests --fix
            - ruff format .

            Review the remaining CI results after this PR, because some issues are not auto-fixable.
          labels: |
            chore
            automated
